<div class="min-h-screen flex items-center justify-center bg-gray-100">

  <div class="bg-white border border-gray-200 p-8 rounded-xl shadow-md w-full max-w-md">

    <!-- Logo / Título -->
    <div class="mb-6 text-center">
      <h2 class="text-2xl font-semibold text-gray-800">
        S. Seguimiento <br> de mantenimiento
      </h2>
      <p class="text-sm text-gray-500">
        Ingrese sus credenciales
      </p>
    </div>

    <!-- Formulario -->
    <form (ngSubmit)="login()">

      <!-- Email -->
      <div class="mb-4">
        <label class="block text-sm text-gray-600 mb-1">
          Correo electrónico
        </label>
        <input 
          type="email"
          name="email"
          [(ngModel)]="email"
          required
          class="w-full px-3 py-2 border border-gray-300 rounded-lg 
                 focus:outline-none focus:ring-1 focus:ring-gray-500 focus:border-gray-500"
          placeholder="usuario@empresa.com">
      </div>

      <!-- Password -->
      <div class="mb-6">
        <label class="block text-sm text-gray-600 mb-1">
          Contraseña
        </label>
        <input 
          type="password"
          name="password"
          [(ngModel)]="password"
          required
          class="w-full px-3 py-2 border border-gray-300 rounded-lg 
                 focus:outline-none focus:ring-1 focus:ring-gray-500 focus:border-gray-500"
          placeholder="••••••••">
      </div>

      <!-- Botón -->
      <button 
        type="submit"
        class="w-full bg-gray-800 text-white py-2 rounded-lg 
               hover:bg-gray-900 transition">
        Ingresar
      </button>

    </form>

    <!-- Footer -->
    <div class="mt-6 text-center text-xs text-gray-400">
      © 2026 Sistema de Mantenimiento
    </div>

  </div>
</div>
