<div class="max-w-4xl mx-auto">

  <!-- CARD PRINCIPAL -->
  <div class="bg-white rounded-3xl shadow-lg overflow-hidden">

    <!-- HEADER CON GRADIENT -->
    <div class="h-28 bg-gradient-to-r from-gray-700 to-gray-700"></div>

    <!-- CONTENIDO -->
    <div class="px-8 pb-8">

      <!-- AVATAR -->
      <div class="-mt-14 flex items-center gap-6">

        <img
          [src]="user.image"
          class="w-28 h-28 rounded-full border-4 border-white shadow-md object-cover"
        >

        <div class="mt-5">
          <h2 class="text-2xl font-bold text-gray-100">
            {{ user.name }}
          </h2>

          <p class="text-gray-500 text-sm flex items-center gap-2 mt-1">
            <i class="fa-solid fa-envelope"></i>
            {{ user.email }}
          </p>

          <span class="inline-flex items-center gap-2 mt-2 text-xs bg-gray-900 text-white px-3 py-1 rounded-full">
            <i class="fa-solid fa-user-shield"></i>
            {{ user.role }}
          </span>
        </div>

      </div>

      <!-- DIVIDER -->
      <div class="my-6 border-t"></div>

      <!-- ACCIONES -->
      <div class="flex flex-wrap gap-3">

        <button
          (click)="openModal()"
          class="flex items-center gap-2 bg-gray-900 text-white px-5 py-2.5 rounded-xl hover:bg-gray-800 transition shadow">

          <i class="fa-solid fa-key"></i>
          Cambiar contraseña
        </button>
      </div>

    </div>
  </div>

</div>

<!-- MODAL -->
<div *ngIf="isModalOpen"
  class="fixed inset-0 bg-black/40 backdrop-blur-sm flex items-center justify-center z-50">

  <div class="bg-white rounded-2xl shadow-xl w-full max-w-md p-6 animate-scale">

    <div class="flex justify-between items-center mb-4">
      <h3 class="font-bold text-lg">Cambiar contraseña</h3>
      <button (click)="closeModal()" class="text-gray-400 hover:text-black">
        <i class="fas fa-xmark"></i>
      </button>
    </div>

    <form (ngSubmit)="changePassword()" class="space-y-4">

      <!-- INPUT REUTILIZABLE -->
      <div class="relative group">
        <input
          [type]="showCurrent ? 'text' : 'password'"
          [(ngModel)]="form.current"
          name="current"
          placeholder=" "
          required
          class="w-full border rounded-xl px-4 pt-5 pb-2 focus:ring-2 focus:ring-gray-900 outline-none">

        <label class="absolute left-4 top-2 text-xs text-gray-400 group-focus-within:text-gray-900">
          Contraseña actual
        </label>

        <button type="button"
          (click)="showCurrent = !showCurrent"
          class="absolute right-3 top-3 text-gray-500">

          <i class="fa-solid"
            [ngClass]="showCurrent ? 'fa-eye-slash' : 'fa-eye'"></i>
        </button>
      </div>

      <!-- NUEVA -->
      <div class="relative group">
        <input
          [type]="showNew ? 'text' : 'password'"
          [(ngModel)]="form.new"
          name="new"
          placeholder=" "
          required
          class="w-full border rounded-xl px-4 pt-5 pb-2 focus:ring-2 focus:ring-gray-900 outline-none">

        <label class="absolute left-4 top-2 text-xs text-gray-400 group-focus-within:text-gray-900">
          Nueva contraseña
        </label>

        <button type="button"
          (click)="showNew = !showNew"
          class="absolute right-3 top-3 text-gray-500">

          <i class="fa-solid"
            [ngClass]="showNew ? 'fa-eye-slash' : 'fa-eye'"></i>
        </button>
      </div>

      <!-- CONFIRMAR -->
      <div class="relative group">
        <input
          [type]="showConfirm ? 'text' : 'password'"
          [(ngModel)]="form.confirm"
          name="confirm"
          placeholder=" "
          required
          class="w-full border rounded-xl px-4 pt-5 pb-2 focus:ring-2 focus:ring-gray-900 outline-none">

        <label class="absolute left-4 top-2 text-xs text-gray-400 group-focus-within:text-gray-900">
          Confirmar contraseña
        </label>

        <button type="button"
          (click)="showConfirm = !showConfirm"
          class="absolute right-3 top-3 text-gray-500">

          <i class="fa-solid"
            [ngClass]="showConfirm ? 'fa-eye-slash' : 'fa-eye'"></i>
        </button>
      </div>

      <!-- BOTÓN -->
      <button
        class="w-full bg-gray-900 text-white py-2.5 rounded-xl hover:bg-gray-800 transition shadow">
        Guardar cambios
      </button>

    </form>

  </div>
</div>
