<div class="p-6 bg-gray-100 min-h-screen">

  <!-- HEADER -->
  <div class="flex justify-between items-center mb-6">
    <h1 class="text-2xl font-semibold text-gray-800">
      Gestión de Usuarios
    </h1>

    <button 
      (click)="showModal = true"
      class="bg-gray-800 text-white px-4 py-2 rounded-lg hover:bg-gray-900">
      + Agregar Usuario
    </button>
  </div>

  <!-- 📊 CARDS -->
  <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-6">

    <div class="bg-white p-4 rounded-xl shadow border">
      <p class="text-gray-500 text-sm">Total Usuarios</p>
      <h3 class="text-xl font-bold">{{ totalUsers }}</h3>
    </div>

    <div class="bg-white p-4 rounded-xl shadow border">
      <p class="text-gray-500 text-sm">Activos</p>
      <h3 class="text-xl font-bold">{{ activos }}</h3>
    </div>

    <div class="bg-white p-4 rounded-xl shadow border">
      <p class="text-gray-500 text-sm">Bloqueados</p>
      <h3 class="text-xl font-bold">{{ bloqueados }}</h3>
    </div>

  </div>

  <!-- 🔍 BUSCADOR -->
  <div class="mb-4">
    <input 
      type="text"
      [(ngModel)]="search"
      (input)="filterUsers()"
      placeholder="Buscar usuario..."
      class="w-full md:w-1/3 px-3 py-2 border rounded-lg focus:ring-1 focus:ring-gray-500">
  </div>

  <!-- 📋 TABLA -->
  <div class="bg-white rounded-xl shadow border overflow-hidden">

    <table class="w-full text-sm">

      <thead class="bg-gray-800 text-white">
        <tr>
          <th class="px-4 py-3 text-left">Nombre</th>
          <th class="px-4 py-3 text-left">Correo</th>
          <th class="px-4 py-3 text-left">Rol</th>
          <th class="px-4 py-3 text-left">Estado</th>
          <th class="px-4 py-3 text-center">Acciones</th>
        </tr>
      </thead>

      <tbody>
        <tr *ngFor="let user of filteredUsers; let i = index"
            class="border-t hover:bg-gray-50">

          <td class="px-4 py-2">{{ user.name }}</td>
          <td class="px-4 py-2">{{ user.email }}</td>
          <td class="px-4 py-2">{{ user.role }}</td>

          <td class="px-4 py-2">
            <span 
              class="px-2 py-1 rounded text-xs"
              [ngClass]="{
                'bg-green-100 text-green-700': user.status === 'Activo',
                'bg-red-100 text-red-700': user.status === 'Bloqueado'
              }">
              {{ user.status }}
            </span>
          </td>

          <td class="px-4 py-2 text-center">
            <button 
              (click)="deleteUser(i)"
              class="bg-red-500 text-white px-3 py-1 rounded hover:bg-red-600">
              Eliminar
            </button>
          </td>

        </tr>
      </tbody>

    </table>

  </div>

  <!-- 🧩 MODAL -->
  <div *ngIf="showModal" class="fixed inset-0 bg-black bg-opacity-30 flex items-center justify-center">

    <div class="bg-white p-6 rounded-xl w-full max-w-md shadow-lg">

      <h2 class="text-lg font-semibold mb-4">Nuevo Usuario</h2>

      <form (ngSubmit)="addUser()" class="space-y-3">

        <input [(ngModel)]="newUser.name" name="name" placeholder="Nombre"
          class="w-full border px-3 py-2 rounded">

        <input [(ngModel)]="newUser.email" name="email" placeholder="Correo"
          class="w-full border px-3 py-2 rounded">

        <select [(ngModel)]="newUser.role" name="role"
          class="w-full border px-3 py-2 rounded">

          <option value="">Rol</option>
          <option *ngFor="let r of roles">{{ r }}</option>

        </select>

        <div class="flex justify-end gap-2 pt-2">

          <button type="button"
            (click)="showModal = false"
            class="px-4 py-2 border rounded">
            Cancelar
          </button>

          <button type="submit"
            class="bg-gray-800 text-white px-4 py-2 rounded">
            Guardar
          </button>

        </div>

      </form>

    </div>

  </div>

</div>
