<div class="p-6 w-[350px]">

  <h2 class="text-xl font-bold mb-3">
    {{ data.title }}
  </h2>

  <p class="text-gray-600 mb-5">
    {{ data.message }}
  </p>

  <div class="flex justify-end gap-2">

    <button class="px-4 py-2 border rounded" (click)="cancel()">
      Cancelar
    </button>

    <button class="px-4 py-2 bg-red-500 text-white rounded" (click)="confirm()">
      Aceptar
    </button>

  </div>

</div>
